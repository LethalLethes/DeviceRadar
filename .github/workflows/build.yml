name: Build DeviceRadar IPA

on:
 push:
   branches: [main]
 workflow_dispatch:

jobs:
 build:
   runs-on: macos-15
   
   steps:
   - name: Checkout
     uses: actions/checkout@v4

   - name: Select Xcode
     run: sudo xcode-select -s /Applications/Xcode_16.3.app

   - name: Create project structure
     run: |
       mkdir -p DeviceRadar/DeviceRadar

       cp Sources/ContentView.swift DeviceRadar/DeviceRadar/ContentView.swift

       cat > DeviceRadar/DeviceRadar/DeviceRadarApp.swift << 'EOF'
       import SwiftUI

       @main
       struct DeviceRadarApp: App {
           var body: some Scene {
               WindowGroup {
                   ContentView()
               }
           }
       }
       EOF

       cat > DeviceRadar/DeviceRadar/Info.plist << 'EOF'
       <?xml version="1.0" encoding="UTF-8"?>
       <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
       <plist version="1.0">
       <dict>
           <key>CFBundleIdentifier</key>
           <string>com.deviceradar.app</string>
           <key>CFBundleName</key>
           <string>DeviceRadar</string>
           <key>CFBundleDisplayName</key>
           <string>DeviceRadar</string>
           <key>CFBundleVersion</key>
           <string>1</string>
           <key>CFBundleShortVersionString</key>
           <string>1.0</string>
           <key>CFBundleExecutable</key>
           <string>DeviceRadar</string>
           <key>CFBundlePackageType</key>
           <string>APPL</string>
           <key>UILaunchScreen</key>
           <dict/>
           <key>UISupportedInterfaceOrientations</key>
           <array>
               <string>UIInterfaceOrientationPortrait</string>
           </array>
       </dict>
       </plist>
       EOF

   - name: Generate Xcode project
     run: |
       cat > project.yml << 'EOF'
       name: DeviceRadar
       options:
         bundleIdPrefix: com.deviceradar
         deploymentTarget:
           iOS: "16.0"
       targets:
         DeviceRadar:
           type: application
           platform: iOS
           sources:
             - path: DeviceRadar/DeviceRadar
           info:
             path: DeviceRadar/DeviceRadar/Info.plist
           settings:
             base:
               PRODUCT_BUNDLE_IDENTIFIER: com.deviceradar.app
               SWIFT_VERSION: 5.9
               TARGETED_DEVICE_FAMILY: 1,2
               CODE_SIGNING_ALLOWED: NO
       EOF

       brew install xcodegen
       xcodegen generate

   - name: Build
     run: |
       xcodebuild \
         -project DeviceRadar.xcodeproj \
         -scheme DeviceRadar \
         -configuration Release \
         -destination "generic/platform=iOS" \
         -derivedDataPath build \
         CODE_SIGNING_ALLOWED=NO \
         CODE_SIGNING_REQUIRED=NO \
         CODE_SIGN_IDENTITY="" \
         ENABLE_BITCODE=NO \
         clean build

   - name: Package IPA
     run: |
       APP_PATH=$(find build -name "*.app" | head -1)
       mkdir -p Payload
       cp -r "$APP_PATH" Payload/DeviceRadar.app
       zip -r DeviceRadar.ipa Payload

   - name: Upload IPA
     uses: actions/upload-artifact@v4
     with:
       name: DeviceRadar-IPA
       path: DeviceRadar.ipa
       retention-days: 7
